<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robo Xavier Pi — Disaster Dispatch Hub</title>
<meta name="description" content="Raspberry Pi field-deployed disaster response dispatch system with GPS and OpenStreetMap integration">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0a0e1a;--panel:rgba(15,23,42,0.85);--primary:#3b82f6;--accent:#10b981;--red:#ef4444;--yellow:#eab308;--green:#22c55e;--text:#f1f5f9;--muted:#64748b;--border:rgba(51,65,85,0.6);--glass:blur(14px)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
header{background:rgba(2,6,23,0.8);backdrop-filter:var(--glass);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000}
.logo{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#38bdf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.gps-badge{display:flex;align-items:center;gap:.5rem;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);padding:.5rem 1rem;border-radius:2rem;font-size:.85rem;font-weight:600}
.gps-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
.main-grid{display:grid;grid-template-columns:340px 1fr 360px;grid-template-rows:auto;gap:0;height:calc(100vh - 60px)}
@media(max-width:1100px){.main-grid{grid-template-columns:1fr;grid-template-rows:auto 400px auto}}
.sidebar{background:var(--panel);backdrop-filter:var(--glass);border-right:1px solid var(--border);padding:1.2rem;overflow-y:auto}
.sidebar h2{font-size:1.1rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
#map{width:100%;height:100%;min-height:400px;background:#0d1117}
.dispatch-panel{background:var(--panel);backdrop-filter:var(--glass);border-left:1px solid var(--border);padding:1.2rem;overflow-y:auto}
.upload-zone{border:2px dashed #334155;border-radius:.75rem;padding:1.5rem;text-align:center;cursor:pointer;transition:all .3s;position:relative;margin-bottom:1rem}
.upload-zone:hover{border-color:var(--primary);background:rgba(59,130,246,0.05)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.file-name{color:var(--accent);font-weight:600;margin-top:.5rem;font-size:.85rem}
.config-group{margin-bottom:1rem}
.config-group label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.5px}
.config-group input[type=text],.config-group select{width:100%;padding:.55rem;border-radius:.5rem;border:1px solid var(--border);background:#0f172a;color:var(--text);font-size:.85rem;font-family:monospace}
.config-group input:focus{outline:2px solid var(--primary)}
.model-checks{display:flex;flex-direction:column;gap:.4rem;margin:.5rem 0}
.model-checks label{display:flex;align-items:center;gap:.5rem;font-size:.82rem;cursor:pointer}
.model-checks input{accent-color:var(--primary);width:1rem;height:1rem}
.btn{width:100%;padding:.7rem;border:none;border-radius:.6rem;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.btn-primary{background:linear-gradient(135deg,var(--primary),#6366f1);color:#fff;box-shadow:0 4px 15px rgba(59,130,246,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(59,130,246,.4)}
.btn-primary:disabled{background:#334155;cursor:not-allowed;box-shadow:none;transform:none}
.btn-danger{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;margin-top:.5rem}
.loader{display:none;width:24px;height:24px;border:3px solid rgba(255,255,255,.15);border-top:3px solid var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:1rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
.zone-card{background:rgba(15,23,42,0.6);border-radius:.75rem;padding:1rem;margin-bottom:.75rem;border-left:4px solid var(--muted);transition:all .3s}
.zone-card.red{border-left-color:var(--red);background:rgba(239,68,68,0.08)}
.zone-card.yellow{border-left-color:var(--yellow);background:rgba(234,179,8,0.08)}
.zone-card.green{border-left-color:var(--green);background:rgba(34,197,94,0.08)}
.zone-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.zone-id{font-weight:700;font-size:.95rem}
.zone-priority{font-size:.75rem;font-weight:700;padding:.2rem .6rem;border-radius:1rem;color:#fff}
.zone-priority.p1{background:var(--red)}
.zone-priority.p2{background:#f97316}
.zone-priority.p3{background:var(--yellow);color:#000}
.zone-priority.p4{background:var(--green);color:#000}
.zone-action{font-size:.82rem;color:#cbd5e1;line-height:1.4;margin:.4rem 0}
.zone-coords{font-size:.75rem;color:var(--muted);font-family:monospace}
.zone-score-bar{height:6px;border-radius:3px;background:#1e293b;margin:.5rem 0;overflow:hidden}
.zone-score-fill{height:100%;border-radius:3px;transition:width .5s}
.override-section{margin-top:.5rem;display:flex;gap:.4rem}
.override-btn{padding:.3rem .6rem;border:1px solid var(--border);border-radius:.4rem;background:transparent;color:var(--text);font-size:.72rem;cursor:pointer;transition:all .2s}
.override-btn:hover{background:rgba(59,130,246,0.2);border-color:var(--primary)}
.override-input{display:none;margin-top:.5rem}
.override-input textarea{width:100%;padding:.4rem;border-radius:.4rem;border:1px solid var(--border);background:#0f172a;color:var(--text);font-size:.8rem;resize:none;height:50px}
.override-input .btn{padding:.4rem;font-size:.75rem;margin-top:.3rem}
.result-img{width:100%;border-radius:.5rem;margin-top:.5rem;max-height:200px;object-fit:contain;background:#000;display:none}
.summary-box{background:rgba(59,130,246,0.08);border-left:3px solid var(--primary);padding:.8rem;border-radius:0 .5rem .5rem 0;margin-top:.8rem;font-size:.82rem;display:none}
.summary-box h4{color:#38bdf8;margin-bottom:.3rem;font-size:.85rem}
.summary-box p{color:#94a3b8;line-height:1.5}
.json-box{background:#020617;color:#34d399;padding:.8rem;border-radius:.5rem;font-family:monospace;font-size:.72rem;white-space:pre-wrap;border:1px solid #064e3b;max-height:200px;overflow-y:auto;margin-top:.8rem}
.legend{display:flex;gap:.8rem;margin:.8rem 0;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:.3rem;font-size:.78rem;color:var(--muted)}
.legend-dot{width:12px;height:12px;border-radius:50%}
.empty-state{text-align:center;color:var(--muted);padding:2rem 1rem}
.empty-state .icon{font-size:2.5rem;margin-bottom:.5rem}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#475569}
</style>
</head>
<body>
<header>
  <div class="logo">⚡ Robo Xavier Pi</div>
  <div class="gps-badge"><div class="gps-dot"></div><span id="gpsStatus">Acquiring GPS...</span></div>
</header>

<div class="main-grid">
  <!-- LEFT SIDEBAR: Upload & Config -->
  <div class="sidebar" id="leftSidebar">
    <h2>📤 Analyze Zone</h2>
    <form id="uploadForm">
      <div class="upload-zone">
        <div style="font-size:1.8rem">🛰️</div>
        <div style="font-size:.85rem;color:var(--muted)">Drop image/video or click</div>
        <input type="file" id="fileInput" accept="image/*,video/mp4,video/avi,video/mov,video/webm,video/quicktime">
        <div class="file-name" id="fileInfo"></div>
      </div>

      <div class="config-group">
        <label>GPS Coordinates (auto from NEO-6M)</label>
        <div style="display:flex;gap:.4rem">
          <input type="text" id="latInput" placeholder="Latitude" style="flex:1">
          <input type="text" id="lonInput" placeholder="Longitude" style="flex:1">
        </div>
      </div>

      <div class="config-group">
        <label>Colab Model URLs</label>
        <input type="text" id="url_model1" placeholder="Model 1 (xView2) URL" style="margin-bottom:.4rem">
        <input type="text" id="url_model3" placeholder="Model 3 (LADI-v2) URL">
      </div>

      <div class="config-group">
        <label>Models</label>
        <div class="model-checks">
          <label><input type="checkbox" class="model-cb" value="model1" checked> xView2 Damage</label>
          <label><input type="checkbox" class="model-cb" value="model3" checked> LADI-v2</label>
          <label><input type="checkbox" class="model-cb" value="model4" checked> Ambulance</label>
          <label><input type="checkbox" class="model-cb" value="model5" checked> Vest</label>
          <label><input type="checkbox" class="model-cb" value="model6" checked> Groq Vision AI</label>
        </div>
      </div>

      <button type="submit" id="submitBtn" class="btn btn-primary" disabled>ANALYZE ZONE 🚀</button>
      <div class="loader" id="loader"></div>
    </form>

    <div class="summary-box" id="summaryBox">
      <h4>👁️ AI Verification</h4>
      <p id="visionText"></p>
      <h4 style="margin-top:.5rem;color:var(--accent)">🧠 Intelligence Summary</h4>
      <p id="summaryText"></p>
    </div>

    <img id="resultImg" class="result-img"/>
    <video id="resultVid" class="result-img" controls style="display:none"></video>

    <h3 style="font-size:.9rem;margin-top:1rem;color:var(--muted)">Raw Telemetry</h3>
    <div class="json-box" id="jsonOutput">// Awaiting analysis...</div>
  </div>

  <!-- CENTER: MAP -->
  <div id="map"></div>

  <!-- RIGHT: DISPATCH PANEL -->
  <div class="dispatch-panel" id="dispatchPanel">
    <h2>🚨 Dispatch Console</h2>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Buildings + Road</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Roads Only</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Clear</div>
    </div>
    <button class="btn btn-danger" id="clearZonesBtn" style="font-size:.78rem;padding:.5rem">🗑️ CLEAR ALL ZONES</button>
    <div id="zonesList" style="margin-top:1rem">
      <div class="empty-state"><div class="icon">📡</div><div>No zones analyzed yet.<br>Upload images to begin dispatch.</div></div>
    </div>
  </div>
</div>

<script>
// ---- MAP INIT ----
const map = L.map('map').setView([28.6139, 77.2090], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

const markers = {};
const colorMap = {red: '#ef4444', yellow: '#eab308', green: '#22c55e'};

function createIcon(color) {
  return L.divIcon({
    className: 'custom-marker',
    html: `<div style="width:22px;height:22px;border-radius:50%;background:${colorMap[color]||'#6366f1'};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5);"></div>`,
    iconSize: [22, 22], iconAnchor: [11, 11]
  });
}

// ---- BROWSER GEOLOCATION (fallback for when NEO-6M is unavailable) ----
let browserGeoWatchId = null;
function requestBrowserLocation() {
  if (!navigator.geolocation) {
    console.log('Geolocation not supported by this browser.');
    return;
  }
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      // Push to server as fallback
      fetch('/gps/browser', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({lat, lon})
      }).catch(() => {});
      // Also fill in fields
      if (!document.getElementById('latInput').value) {
        document.getElementById('latInput').value = lat.toFixed(6);
        document.getElementById('lonInput').value = lon.toFixed(6);
      }
      document.getElementById('gpsStatus').textContent = `${lat.toFixed(5)}, ${lon.toFixed(5)} | Browser`;
    },
    (err) => {
      console.log('Geolocation permission denied or error:', err.message);
      document.getElementById('gpsStatus').textContent = 'Location denied — enter manually';
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
  // Also watch for continuous updates
  browserGeoWatchId = navigator.geolocation.watchPosition(
    (pos) => {
      fetch('/gps/browser', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({lat: pos.coords.latitude, lon: pos.coords.longitude})
      }).catch(() => {});
    },
    () => {},
    { enableHighAccuracy: true }
  );
}
// Request on page load
requestBrowserLocation();

// ---- GPS POLL ----
function pollGPS() {
  fetch('/gps').then(r => r.json()).then(d => {
    const el = document.getElementById('gpsStatus');
    if (d.fix && d.lat) {
      const src = d.source === 'browser' ? 'Browser' : `${d.satellites} sats`;
      el.textContent = `${d.lat.toFixed(5)}, ${d.lon.toFixed(5)} | ${src}`;
      document.getElementById('latInput').placeholder = d.lat.toFixed(6);
      document.getElementById('lonInput').placeholder = d.lon.toFixed(6);
      if (!document.getElementById('latInput').value) {
        document.getElementById('latInput').value = d.lat.toFixed(6);
        document.getElementById('lonInput').value = d.lon.toFixed(6);
      }
    } else { el.textContent = 'Acquiring GPS...'; }
  }).catch(() => {});
}
setInterval(pollGPS, 3000);
pollGPS();

// ---- FILE INPUT ----
const fileInput = document.getElementById('fileInput');
const submitBtn = document.getElementById('submitBtn');
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) {
    document.getElementById('fileInfo').textContent = fileInput.files[0].name;
    submitBtn.disabled = false;
  }
});

// ---- UPLOAD / ANALYZE ----
document.getElementById('uploadForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!fileInput.files.length) return;
  submitBtn.disabled = true;
  document.getElementById('loader').style.display = 'block';
  document.getElementById('jsonOutput').textContent = 'Processing...';

  const fd = new FormData();
  fd.append('file', fileInput.files[0]);
  fd.append('url_model1', document.getElementById('url_model1').value);
  fd.append('url_model3', document.getElementById('url_model3').value);
  const lat = document.getElementById('latInput').value;
  const lon = document.getElementById('lonInput').value;
  if (lat && lon) { fd.append('latitude', lat); fd.append('longitude', lon); }

  const sel = Array.from(document.querySelectorAll('.model-cb:checked')).map(c => c.value);
  fd.append('models', JSON.stringify(sel));

  try {
    const res = await fetch('/process', {method:'POST', body:fd});
    const data = await res.json();
    document.getElementById('jsonOutput').textContent = JSON.stringify(data.json_output, null, 2);

    if (data.json_output?.summary) {
      document.getElementById('visionText').textContent = data.json_output.vision_verification || 'N/A';
      document.getElementById('summaryText').textContent = data.json_output.summary;
      document.getElementById('summaryBox').style.display = 'block';
    }
    // Handle image result
    if (data.type === 'image' && data.image_url) {
      document.getElementById('resultImg').src = data.image_url + '?t=' + Date.now();
      document.getElementById('resultImg').style.display = 'block';
      document.getElementById('resultVid').style.display = 'none';
    }
    // Handle video result
    if (data.type === 'video' && data.video_url) {
      document.getElementById('resultVid').src = data.video_url + '?t=' + Date.now();
      document.getElementById('resultVid').style.display = 'block';
      document.getElementById('resultImg').style.display = 'none';
      // Show last event summary if available
      const events = data.json_output?.video_events;
      if (events && events.length > 0) {
        const last = events[events.length - 1];
        if (last.results?.summary) {
          document.getElementById('visionText').textContent = last.results.vision_verification || 'N/A';
          document.getElementById('summaryText').textContent = last.results.summary;
          document.getElementById('summaryBox').style.display = 'block';
        }
      }
    }
    refreshZones();
  } catch (err) {
    document.getElementById('jsonOutput').textContent = 'Error: ' + err.message;
  } finally {
    submitBtn.disabled = false;
    document.getElementById('loader').style.display = 'none';
  }
});

// ---- ZONES ----
function refreshZones() {
  fetch('/zones').then(r => r.json()).then(data => {
    const list = document.getElementById('zonesList');
    if (!data.zones || data.zones.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📡</div><div>No zones analyzed yet.</div></div>';
      return;
    }
    list.innerHTML = '';
    // Clear old markers
    Object.keys(markers).forEach(k => { map.removeLayer(markers[k]); delete markers[k]; });

    data.zones.forEach(z => {
      // Priority class
      const pc = z.priority <= 1 ? 'p1' : z.priority <= 2 ? 'p2' : z.priority <= 3 ? 'p3' : 'p4';
      const scorePercent = Math.min(z.score * 100 / 0.5, 100);
      const barColor = z.color === 'red' ? 'var(--red)' : z.color === 'yellow' ? 'var(--yellow)' : 'var(--green)';

      const card = document.createElement('div');
      card.className = `zone-card ${z.color}`;
      card.innerHTML = `
        <div class="zone-header">
          <span class="zone-id">${z.zone_id}</span>
          <span class="zone-priority ${pc}">Priority ${z.priority}</span>
        </div>
        <div class="zone-score-bar"><div class="zone-score-fill" style="width:${scorePercent}%;background:${barColor}"></div></div>
        <div class="zone-action">📋 ${z.override ? '⚠️ OVERRIDDEN: ' : ''}${z.action}</div>
        <div class="zone-coords">📍 ${z.lat?.toFixed(5) || '?'}, ${z.lon?.toFixed(5) || '?'} | Score: ${z.score.toFixed(4)}</div>
        <div class="override-section">
          <button class="override-btn" onclick="toggleOverride('${z.zone_id}')">✏️ Manual Override</button>
          <button class="override-btn" onclick="setColor('${z.zone_id}','red')">🔴</button>
          <button class="override-btn" onclick="setColor('${z.zone_id}','yellow')">🟡</button>
          <button class="override-btn" onclick="setColor('${z.zone_id}','green')">🟢</button>
        </div>
        <div class="override-input" id="override-${z.zone_id}">
          <textarea placeholder="Enter new dispatch action..." id="ov-text-${z.zone_id}"></textarea>
          <button class="btn btn-primary" onclick="submitOverride('${z.zone_id}')" style="padding:.4rem;font-size:.75rem">APPLY OVERRIDE</button>
        </div>`;
      list.appendChild(card);

      // Map marker
      if (z.lat && z.lon) {
        const m = L.marker([z.lat, z.lon], {icon: createIcon(z.color)}).addTo(map);
        m.bindPopup(`<b>${z.zone_id}</b><br>Priority: ${z.priority}<br>${z.action}<br><small>${z.lat.toFixed(5)}, ${z.lon.toFixed(5)}</small>`);
        markers[z.zone_id] = m;
      }
    });

    // Fit map to markers
    const lats = data.zones.filter(z => z.lat).map(z => [z.lat, z.lon]);
    if (lats.length) map.fitBounds(lats, {padding: [40, 40], maxZoom: 14});
  });
}

function toggleOverride(zid) {
  const el = document.getElementById('override-' + zid);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function submitOverride(zid) {
  const text = document.getElementById('ov-text-' + zid).value;
  if (!text.trim()) return;
  fetch('/zones/override', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({zone_id: zid, action: text})
  }).then(() => refreshZones());
}

function setColor(zid, color) {
  fetch('/zones/override', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({zone_id: zid, color: color})
  }).then(() => refreshZones());
}

document.getElementById('clearZonesBtn').addEventListener('click', () => {
  if (confirm('Clear all zones?')) {
    fetch('/zones/clear', {method:'POST'}).then(() => refreshZones());
  }
});

// Initial load
refreshZones();
</script>
</body>
</html>
